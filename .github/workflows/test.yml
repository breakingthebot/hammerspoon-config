name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Run window manager tests
        run: lua5.4 tests/test_window_manager.lua

      - name: Run app launcher tests
        run: lua5.4 tests/test_app_launcher.lua
